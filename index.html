  @media(min-width:600px) { .bg { background-size:contain; background-color:#080412; } }
  .page { position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; }
  .hero { height:75svh; min-height:440px; width:100%; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding-bottom:24px; }
  .hero-bottom { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .hero-logo { width:min(68vw,270px); animation:pulse 6s ease-in-out infinite; }
  @media(min-width:600px) { .hero-logo { width:200px; } }
  @keyframes pulse { 0%,100% { filter:drop-shadow(0 0 6px rgba(123,47,255,.45)); } 50% { filter:drop-shadow(0 0 14px rgba(123,47,255,.7)) drop-shadow(0 0 25px rgba(201,77,255,.25)); } }
  .tagline { text-align:center; }
  .line1 { font-family:'IM Fell English',serif; font-size:15px; color:rgba(240,234,248,.75); letter-spacing:.04em; display:block; margin-bottom:3px; }
  .line2 { font-family:'IM Fell English',serif; font-size:13px; color:rgba(240,234,248,.45); letter-spacing:.08em; display:block; }
  .scroll-hint { position:absolute; bottom:-28px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:4px; opacity:0; animation:fadeIn 1s 2s both; }
  .scroll-hint span { font-size:8px; letter-spacing:.3em; color:rgba(240,234,248,.25); text-transform:uppercase; }
  .scroll-line { width:1px; height:16px; background:linear-gradient(180deg,rgba(201,77,255,.4),transparent); animation:lp 1.8s ease-in-out infinite; }
  @keyframes lp { 0%,100% { opacity:.3; } 50% { opacity:1; } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .links-section { width:100%; max-width:460px; padding:20px 20px 60px; display:flex; flex-direction:column; gap:10px; background:linear-gradient(180deg,rgba(8,4,18,.6) 0%,rgba(8,4,18,.85) 40px); }
  .link-card { display:flex; align-items:center; gap:14px; padding:14px 18px; background:rgba(8,4,18,.58); border:1px solid rgba(255,255,255,.1); border-radius:12px; text-decoration:none; color:#f0eaf8; transition:all .25s ease; -webkit-tap-highlight-color:transparent; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
  .link-card:hover,.link-card:active { background:rgba(123,47,255,.2); border-color:rgba(123,47,255,.4); transform:translateX(4px); }
  .link-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .link-icon svg { width:20px; height:20px; }
  .link-info { flex:1; }
  .link-platform { font-size:9px; color:rgba(240,234,248,.3); margin-bottom:2px; }
  .link-label { font-size:14px; font-weight:700; color:#f0eaf8; }
  .link-arrow { color:rgba(240,234,248,.2); font-size:16px; flex-shrink:0; }
  .card-spotify .link-icon { background:rgba(30,215,96,.12); }
  .card-instagram .link-icon { background:rgba(228,64,95,.12); }
  .card-youtube .link-icon { background:rgba(255,0,0,.1); }
  .card-tiktok .link-icon { background:rgba(0,242,234,.08); }
  .card-x .link-icon { background:rgba(255,255,255,.06); }
  footer { text-align:center; padding:16px 0 30px; width:100%; }
  footer p { font-size:9px; letter-spacing:.3em; color:rgba(255,255,255,.12); text-transform:uppercase; }
</style>
