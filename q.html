<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KZTV</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Inter',sans-serif;background:#000;overflow:hidden}

/* Site réel en fond */
#site-behind{
  position:fixed;inset:0;width:100%;height:100%;
  border:none;z-index:1;
}

/* Overlay sombre derrière le popup */
#overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0);
  backdrop-filter:blur(0px);
  z-index:10;
  opacity:0;
  transition:opacity .4s ease, backdrop-filter .4s ease;
  pointer-events:none;
}
#overlay.on{
  opacity:1;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(2px);
  pointer-events:all;
}

/* Popup */
#popup{
  position:fixed;
  bottom:0;left:50%;
  transform:translateX(-50%) translateY(110%);
  width:min(480px,100vw);
  z-index:20;
  transition:transform .5s cubic-bezier(.16,1,.3,1);
}
#popup.open{transform:translateX(-50%) translateY(0)}

.inner{
  background:rgba(12,8,22,.92);
  backdrop-filter:blur(28px) saturate(1.6);
  border:1px solid rgba(123,47,255,.25);
  border-bottom:none;
  border-radius:20px 20px 0 0;
  padding:24px 22px 40px;
}

/* Header */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.ph img{height:22px;opacity:.9;}
.ph .badge{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(201,77,255,.6);background:rgba(123,47,255,.12);border:1px solid rgba(123,47,255,.2);border-radius:20px;padding:4px 10px;font-weight:600;}

/* Texte */
.headline{font-size:18px;font-weight:700;color:#f0eaf8;line-height:1.3;margin-bottom:8px;}
.headline span{color:#c94dff;}
.sub{font-size:13px;color:rgba(240,234,248,.45);line-height:1.6;margin-bottom:20px;}

/* Player */
#pw{
  background:rgba(123,47,255,.06);
  border:1px solid rgba(123,47,255,.18);
  border-radius:12px;
  padding:13px 15px;
  margin-bottom:20px;
  cursor:pointer;
}
.pac{display:flex;align-items:center;gap:13px;}
.pbtn{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#7b2fff,#c94dff);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform .1s;
}
.pbtn:active{transform:scale(.92);}
.pbtn svg{width:18px;height:18px;fill:#fff;}
.tinfo{flex:1;overflow:hidden;}
.ttitle{font-size:13px;font-weight:600;color:#f0eaf8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tsub{font-size:10px;color:rgba(240,234,248,.35);margin-top:2px;letter-spacing:.05em;}
.eq{display:flex;align-items:flex-end;gap:2px;height:16px;flex-shrink:0;}
.eb{width:3px;background:#c94dff;border-radius:2px;opacity:0;transition:opacity .3s;animation:ea .8s ease-in-out infinite alternate;}
.eq.on .eb{opacity:1;}
.eb:nth-child(1){height:6px;animation-delay:0s}
.eb:nth-child(2){height:12px;animation-delay:.15s}
.eb:nth-child(3){height:8px;animation-delay:.3s}
.eb:nth-child(4){height:16px;animation-delay:.1s}
.eb:nth-child(5){height:5px;animation-delay:.25s}
@keyframes ea{from{transform:scaleY(.25)}to{transform:scaleY(1)}}

/* Liens rapides */
.links{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px;}
.lnk{
  display:flex;align-items:center;gap:5px;
  padding:7px 12px;
  border:1px solid rgba(255,255,255,.1);
  border-radius:8px;
  background:rgba(255,255,255,.04);
  color:rgba(240,234,248,.7);
  text-decoration:none;
  font-size:11px;font-weight:500;
  transition:all .2s;
}
.lnk:hover{border-color:rgba(123,47,255,.4);background:rgba(123,47,255,.12);color:#f0eaf8;}

/* CTA */
#btn{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#7b2fff,#c94dff);
  border:none;border-radius:12px;
  color:#fff;font-family:'Inter',sans-serif;
  font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:.02em;
  transition:opacity .2s,transform .1s;
}
#btn:active{transform:scale(.98);opacity:.85;}

/* YT audio hidden */
#yta{position:absolute;width:0;height:0;opacity:0;pointer-events:none;}
</style>
</head>
<body>

<iframe id="site-behind" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>
<div id="overlay"></div>

<div id="popup">
  <div class="inner">
    <div class="ph">
      <img src="https://raw.githubusercontent.com/KZTV-ThirdVision/KZTV_links/main/logo.png" alt="KZTV">
      <span class="badge">pub</span>
    </div>

    <p class="headline">T'as scanné un QR code <span>KZTV.</span></p>
    <p class="sub">C'est juste une pub. Pas une arnaque. Le vrai site se charge derrière. Appuie sur le bouton pour y accéder.</p>

    <div id="pw" onclick="togglePlay()">
      <div class="pac">
        <button class="pbtn">
          <svg id="iplay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="ipause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <div class="tinfo">
          <div class="ttitle" id="ttitle">KZTV — third vision</div>
          <div class="tsub">Écouter</div>
        </div>
        <div class="eq" id="eq">
          <div class="eb"></div><div class="eb"></div>
          <div class="eb"></div><div class="eb"></div><div class="eb"></div>
        </div>
      </div>
    </div>

    <div class="links" id="links"></div>

    <button id="btn" onclick="leave()">Accéder au site →</button>
  </div>
</div>

<div id="yta"></div>

<script>
const SB_URL = 'https://bkqdhndjmpwdtcelrdit.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrcWRobmRqbXB3ZHRjZWxyZGl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTc5NDQsImV4cCI6MjA5Mzk5Mzk0NH0.CyYJFze2ggc1x0JNhYp7abCEWR1vOJq2r3dB8TowUEE';

const LINKS = [
  {label:'Spotify', url:'https://open.spotify.com/artist/2v6RwbFyutxTZbHPJX3eVH'},
  {label:'Instagram', url:'https://www.instagram.com/kztv__'},
  {label:'YouTube', url:'https://www.youtube.com/@kztv_v2'},
  {label:'TikTok', url:'https://www.tiktok.com/@kztv_third_vision'},
];

const params = new URLSearchParams(location.search);
const realSite = params.get('site') || '';
const spotId   = params.get('id')   || '';

let ytPlayer = null, playing = false, ytReady = false, interacted = false;
let spotData = null;

async function init() {
  // Charger le vrai site immédiatement en fond
  if (realSite) {
    document.getElementById('site-behind').src = realSite;
  }

  // Charger config spot si ID fourni
  if (spotId) {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/spots?id=eq.${spotId}&select=*`, {
        headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY}
      });
      const d = await r.json();
      if (d && d[0]) {
        spotData = d[0];
        // Désactivé = redirect direct sans popup
        if (!spotData.active) {
          window.location.href = spotData.real_url || realSite;
          return;
        }
        // Incrémenter scans
        fetch(`${SB_URL}/rest/v1/spots?id=eq.${spotId}`, {
          method: 'PATCH',
          headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal'},
          body: JSON.stringify({scans_count: (spotData.scans_count || 0) + 1})
        });
        if (spotData.track_title) document.getElementById('ttitle').textContent = spotData.track_title;
      }
    } catch(e) {}
  }

  renderLinks();
  loadYT();

  // Popup après 1.5s
  setTimeout(openPopup, 1500);
}

function renderLinks() {
  const c = document.getElementById('links');
  LINKS.forEach(l => {
    const a = document.createElement('a');
    a.href = l.url; a.target = '_blank'; a.rel = 'noopener';
    a.className = 'lnk';
    a.textContent = l.label;
    c.appendChild(a);
  });
}

function openPopup() {
  document.getElementById('overlay').classList.add('on');
  document.getElementById('popup').classList.add('open');
  // Lancer le son au premier tap utilisateur
  document.getElementById('popup').addEventListener('click', onFirstInteraction, {once: true});
}

function onFirstInteraction() {
  if (interacted) return;
  interacted = true;
  if (ytReady && ytPlayer) {
    try { ytPlayer.playVideo(); } catch(e) {}
  }
}

function loadYT() {
  const ytId = spotData?.yt_url || 'yqjok8xHvSk'; // défaut : track KZTV
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
  window._ytId = ytId;
}

window.onYouTubeIframeAPIReady = function() {
  ytPlayer = new YT.Player('yta', {
    height:'1', width:'1', videoId: window._ytId,
    playerVars: {autoplay:0, controls:0, fs:0, rel:0, playsinline:1},
    events: {
      onReady: () => { ytReady = true; if (interacted) try { ytPlayer.playVideo(); } catch(e){} },
      onStateChange: e => {
        const isPlaying = e.data === YT.PlayerState.PLAYING;
        setPlayUI(isPlaying);
      }
    }
  });
};

function togglePlay() {
  onFirstInteraction();
  if (!ytReady || !ytPlayer) return;
  playing ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
}

function setPlayUI(isPlaying) {
  playing = isPlaying;
  document.getElementById('iplay').style.display  = isPlaying ? 'none'  : 'block';
  document.getElementById('ipause').style.display = isPlaying ? 'block' : 'none';
  document.getElementById('eq').classList.toggle('on', isPlaying);
}

function leave() {
  // Fermer le popup proprement puis partir
  document.getElementById('popup').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
  if (ytPlayer) try { ytPlayer.pauseVideo(); } catch(e) {}
  const dest = spotData?.real_url || realSite;
  if (dest) {
    setTimeout(() => { window.location.href = dest; }, 300);
  }
}

init();
</script>
</body>
</html>
