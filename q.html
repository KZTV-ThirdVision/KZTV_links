<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KZTV</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{--v:#7b2fff;--vl:#c94dff;--bg:#080412;--border:rgba(123,47,255,0.25);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:#f0eaf8;overflow:hidden;}

/* Fond simulé — site derrière */
#bg-site{
  position:fixed;inset:0;z-index:1;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.bg-favicon{width:52px;height:52px;border-radius:12px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:22px;}
.bg-domain{font-size:16px;font-weight:600;color:rgba(240,234,248,.6);letter-spacing:.02em;}
.bg-bar{width:200px;height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.bg-bar-fill{height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shimmer 1.5s ease-in-out infinite;}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}
.bg-url{font-size:11px;color:rgba(240,234,248,.25);letter-spacing:.05em;max-width:280px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Overlay */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:10;opacity:0;transition:opacity .5s ease;pointer-events:none;}
#overlay.on{opacity:1;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);pointer-events:all;}

/* Popup */
#popup{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(110%);
  width:min(480px,100vw);z-index:20;
  transition:transform .5s cubic-bezier(.16,1,.3,1);
}
#popup.open{transform:translateX(-50%) translateY(0);}
.inner{
  background:rgba(10,6,20,.92);
  backdrop-filter:blur(28px) saturate(1.4);
  border:1px solid var(--border);border-bottom:none;
  border-radius:22px 22px 0 0;
  padding:26px 22px 40px;
}

/* Header */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.ph img{height:22px;opacity:.9;}
.badge{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(201,77,255,.7);background:rgba(123,47,255,.15);border:1px solid rgba(123,47,255,.3);border-radius:20px;padding:4px 10px;font-weight:600;}

.headline{font-size:18px;font-weight:700;color:#f0eaf8;line-height:1.3;margin-bottom:6px;}
.headline span{color:#c94dff;}
.sub{font-size:13px;color:rgba(240,234,248,.45);line-height:1.6;margin-bottom:18px;}

/* Player */
#pw{background:rgba(123,47,255,.07);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:18px;cursor:pointer;transition:background .2s;}
#pw:active{background:rgba(123,47,255,.15);}
#ac{display:flex;align-items:center;gap:13px;}
.pbtn{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--vl));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s;}
.pbtn:active{transform:scale(.9);}
.pbtn svg{width:19px;height:19px;fill:#fff;}
.tinfo{flex:1;overflow:hidden;}
.ttitle{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#f0eaf8;}
.tsub{font-size:11px;color:rgba(240,234,248,.4);margin-top:2px;}
.eq{display:flex;align-items:flex-end;gap:2px;height:18px;flex-shrink:0;}
.eb{width:3px;background:var(--vl);border-radius:2px;animation:ea .8s ease-in-out infinite alternate;opacity:0;transition:opacity .3s;}
.eq.on .eb{opacity:1;}
.eb:nth-child(1){height:7px;animation-delay:0s}.eb:nth-child(2){height:13px;animation-delay:.15s}
.eb:nth-child(3){height:9px;animation-delay:.3s}.eb:nth-child(4){height:17px;animation-delay:.1s}
.eb:nth-child(5){height:5px;animation-delay:.25s}
@keyframes ea{from{transform:scaleY(.3)}to{transform:scaleY(1)}}
.tap-hint{font-size:11px;color:rgba(240,234,248,.3);text-align:center;margin-top:8px;font-style:italic;}

/* Liens */
.links{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;}
.lnk{display:flex;align-items:center;gap:5px;padding:7px 12px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.04);color:rgba(240,234,248,.7);text-decoration:none;font-size:11px;font-weight:500;transition:all .2s;}
.lnk:active{border-color:rgba(123,47,255,.4);background:rgba(123,47,255,.12);}

/* CTA */
#btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--v),var(--vl));border:none;border-radius:14px;color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .2s;}
#btn:active{opacity:.85;}

#yta{position:absolute;width:0;height:0;opacity:0;pointer-events:none;}
</style>
</head>
<body>

<!-- Fond simulé -->
<div id="bg-site">
  <div class="bg-favicon" id="bg-icon">🌐</div>
  <div class="bg-domain" id="bg-domain">chargement...</div>
  <div class="bg-bar"><div class="bg-bar-fill"></div></div>
  <div class="bg-url" id="bg-url"></div>
</div>

<div id="overlay"></div>

<div id="popup">
  <div class="inner">
    <div class="ph">
      <img src="https://raw.githubusercontent.com/KZTV-ThirdVision/KZTV_links/main/logo.png" alt="KZTV">
      <span class="badge">pub</span>
    </div>
    <p class="headline">T'as scanné un QR code <span>KZTV.</span></p>
    <p class="sub">C'est juste une pub. Le vrai site se charge derrière — appuie sur le bouton pour y accéder.</p>

    <div id="pw" onclick="togglePlay()">
      <div id="ac">
        <button class="pbtn">
          <svg id="iplay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="ipause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <div class="tinfo">
          <div class="ttitle" id="ttitle">KZTV — third vision</div>
          <div class="tsub" id="tsub">Tap pour écouter</div>
        </div>
        <div class="eq" id="eq">
          <div class="eb"></div><div class="eb"></div>
          <div class="eb"></div><div class="eb"></div><div class="eb"></div>
        </div>
      </div>
      <div class="tap-hint" id="tap-hint">▶ Tape pour lancer la musique</div>
    </div>

    <div class="links" id="links"></div>
    <button id="btn" onclick="leave()">Accéder au site →</button>
  </div>
</div>

<div id="yta"></div>

<script>
const SB_URL = 'https://bkqdhndjmpwdtcelrdit.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrcWRobmRqbXB3ZHRjZWxyZGl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTc5NDQsImV4cCI6MjA5Mzk5Mzk0NH0.CyYJFze2ggc1x0JNhYp7abCEWR1vOJq2r3dB8TowUEE';

const LINKS = [
  {label:'Spotify', url:'https://open.spotify.com/artist/2v6RwbFyutxTZbHPJX3eVH'},
  {label:'Instagram', url:'https://www.instagram.com/kztv__'},
  {label:'YouTube', url:'https://www.youtube.com/@kztv_v2'},
  {label:'TikTok', url:'https://www.tiktok.com/@kztv_third_vision'},
];

const params = new URLSearchParams(location.search);
const realSite = params.get('site') || '';
const spotId   = params.get('id')   || '';

let ytPlayer = null, playing = false, ytReady = false, interacted = false;
let spotData = null;

async function init() {
  // Afficher le domaine du vrai site en fond
  if (realSite) {
    try {
      var u = new URL(realSite);
      document.getElementById('bg-domain').textContent = u.hostname;
      document.getElementById('bg-url').textContent = realSite;
      // Favicon via Google
      document.getElementById('bg-icon').innerHTML = '<img src="https://www.google.com/s2/favicons?domain='+u.hostname+'&sz=64" style="width:40px;height:40px;border-radius:8px;" onerror="this.parentElement.textContent='🌐'">';
    } catch(e) {}
  }

  // Charger config spot
  if (spotId) {
    try {
      const r = await fetch(SB_URL+'/rest/v1/spots?id=eq.'+spotId+'&select=*', {
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
      });
      const d = await r.json();
      if (d && d[0]) {
        spotData = d[0];
        if (!spotData.active) { window.location.href = spotData.real_url || realSite; return; }
        // Incrémenter scans
        fetch(SB_URL+'/rest/v1/spots?id=eq.'+spotId, {
          method:'PATCH',
          headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
          body:JSON.stringify({scans_count:(spotData.scans_count||0)+1})
        });
        if (spotData.track_title) {
          document.getElementById('ttitle').textContent = spotData.track_title;
          document.getElementById('tsub').textContent = 'KZTV · third vision';
        }
      }
    } catch(e) {}
  }

  renderLinks();
  loadYT();

  // Popup après 1.5s — la page "se charge" puis le popup arrive
  setTimeout(openPopup, 1500);
}

function renderLinks() {
  const c = document.getElementById('links');
  LINKS.forEach(l => {
    const a = document.createElement('a');
    a.href=l.url; a.target='_blank'; a.rel='noopener'; a.className='lnk';
    a.textContent=l.label; c.appendChild(a);
  });
}

function openPopup() {
  document.getElementById('overlay').classList.add('on');
  document.getElementById('popup').classList.add('open');
}

function loadYT() {
  const ytId = spotData?.yt_url || null;
  if (!ytId) return;
  window._ytId = ytId;
  window._ytStart = spotData?.start_time || 0;
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
}

window.onYouTubeIframeAPIReady = function() {
  if (!window._ytId) return;
  ytPlayer = new YT.Player('yta', {
    height:'1', width:'1', videoId: window._ytId,
    playerVars:{autoplay:0, controls:0, fs:0, rel:0, playsinline:1, start: window._ytStart||0},
    events:{
      onReady: function(e) {
        ytReady = true;
        // Essayer autoplay (marchera sur certains navigateurs)
        try { e.target.playVideo(); } catch(err){}
      },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.PLAYING) setPlay(true);
        else if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) setPlay(false);
      }
    }
  });
};

function togglePlay() {
  if (!ytReady || !ytPlayer) return;
  interacted = true;
  document.getElementById('tap-hint').style.display = 'none';
  playing ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
}

function setPlay(isP) {
  playing = isP;
  document.getElementById('iplay').style.display  = isP ? 'none'  : 'block';
  document.getElementById('ipause').style.display = isP ? 'block' : 'none';
  document.getElementById('eq').classList.toggle('on', isP);
  if (isP) document.getElementById('tap-hint').style.display = 'none';
}

function leave() {
  document.getElementById('popup').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
  if (ytPlayer) try{ytPlayer.pauseVideo();}catch(e){}
  const dest = spotData?.real_url || realSite;
  if (dest) setTimeout(()=>{ window.location.href = dest; }, 300);
}

init();
</script>
</body>
</html>
