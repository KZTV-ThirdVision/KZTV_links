<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KZTV — Nouveau son</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#080412;font-family:'Space Mono',monospace;overflow-x:hidden;min-height:100vh;}
.bg{position:fixed;inset:0;background-image:url("https://raw.githubusercontent.com/KZTV-ThirdVision/KZTV_links/main/logo.png");background-repeat:no-repeat;background-position:center center;background-size:cover;filter:blur(20px) brightness(0.25) saturate(1.2);transform:scale(1.1);z-index:0;}
.page{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;min-height:100vh;justify-content:center;padding:40px 20px;}
.card{max-width:420px;width:100%;display:flex;flex-direction:column;align-items:center;gap:16px;}
.cover{width:180px;height:180px;border-radius:12px;object-fit:cover;box-shadow:0 8px 40px rgba(0,0,0,.6);}
.title{font-family:'IM Fell English',serif;font-size:clamp(20px,5vw,28px);color:#f0eaf8;letter-spacing:.04em;text-align:center;margin-top:4px;}
.artist{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,234,248,.35);}
.links{width:100%;display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.link-btn{display:flex;align-items:center;padding:14px 18px;background:rgba(8,4,18,.55);border:1px solid rgba(255,255,255,.1);border-radius:12px;text-decoration:none;color:#f0eaf8;transition:all .25s ease;backdrop-filter:blur(10px);}
.link-btn:hover,.link-btn:active{background:rgba(123,47,255,.2);border-color:rgba(123,47,255,.4);transform:translateX(4px);}
.link-btn .icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:14px;}
.link-btn .icon svg{width:20px;height:20px;}
.link-btn .action{font-size:13px;color:rgba(240,234,248,.5);flex-shrink:0;}
.link-btn .spacer{flex:1;}
.link-btn .name{font-size:14px;font-weight:700;margin-right:8px;}
.link-btn .arrow{color:rgba(240,234,248,.2);font-size:16px;}
.i-spotify{background:rgba(30,215,96,.12);}
.i-youtube{background:rgba(255,0,0,.1);}
.i-apple{background:rgba(250,36,60,.1);}
.i-deezer{background:rgba(162,56,255,.12);}
.i-amazon{background:rgba(255,153,0,.1);}
.back{margin-top:24px;font-size:10px;letter-spacing:.2em;color:rgba(240,234,248,.2);text-decoration:none;text-transform:uppercase;}
.back:hover{color:rgba(240,234,248,.5);}
</style>
</head>
<body>
<div class="bg"></div>
<div class="page">
<div class="card">
<img class="cover" src="https://raw.githubusercontent.com/KZTV-ThirdVision/KZTV_links/main/logo.png" alt="Nouveau son">
<div class="title">Nouveau son</div>
<div class="artist">KZTV</div>
<div class="links">

</div>
<a class="back" href="/">← kztv</a>
</div>
</div>
</body>
</html>
