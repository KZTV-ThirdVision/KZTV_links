<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KZTV Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#080412;font-family:'Space Mono',monospace;color:#f0eaf8;min-height:100vh;}
.screen{position:fixed;inset:0;background:#080412;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:1000;padding:20px;}
.screen.hidden{display:none;}
.screen img{width:130px;margin-bottom:8px;}
.stitle{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(240,234,248,.35);}
.inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:14px 18px;color:#f0eaf8;font-family:'Space Mono',monospace;font-size:13px;width:min(300px,85vw);text-align:center;outline:none;}
.inp:focus{border-color:#7b2fff;}
.hint{font-size:10px;color:rgba(240,234,248,.3);text-align:center;max-width:280px;line-height:1.6;}
.btn{background:linear-gradient(135deg,#7b2fff,#c94dff);border:none;border-radius:10px;padding:14px;color:white;font-family:'Space Mono',monospace;font-weight:700;font-size:13px;cursor:pointer;width:min(300px,85vw);}
.btn:active{opacity:.75;}
.errm{color:#ff4d6d;font-size:11px;display:none;}
.admin-page{display:none;min-height:100vh;padding-bottom:80px;background:#080412;}
.wrap{max-width:500px;margin:0 auto;padding:28px 20px;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.hdr h1{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:rgba(240,234,248,.35);}
.save-btn{background:linear-gradient(135deg,#7b2fff,#c94dff);border:none;border-radius:8px;padding:11px 22px;color:white;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;}
.save-btn.saving{opacity:.4;pointer-events:none;}
.sec{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px;margin-bottom:14px;}
.sec-t{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(240,234,248,.3);margin-bottom:14px;}
.fld{margin-bottom:10px;}
.fld label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(240,234,248,.28);display:block;margin-bottom:5px;}
.fld input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:11px 14px;color:#f0eaf8;font-family:'Space Mono',monospace;font-size:13px;outline:none;}
.fld input:focus{border-color:#7b2fff;}
.llist{display:flex;flex-direction:column;gap:8px;}
.litem{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 14px;user-select:none;}
.litem.drag-over{border-color:#c94dff;}
.lhdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.dh{font-size:18px;color:rgba(240,234,248,.18);cursor:grab;flex-shrink:0;touch-action:none;}
.lnum{font-size:9px;color:rgba(240,234,248,.3);flex:1;text-transform:uppercase;letter-spacing:.1em;}
.delbtn{background:none;border:none;color:rgba(255,77,100,.35);font-size:18px;cursor:pointer;}
.lflds{display:flex;flex-direction:column;gap:7px;}
.lflds input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:9px 12px;color:#f0eaf8;font-family:'Space Mono',monospace;font-size:12px;outline:none;}
.lflds input:focus{border-color:#7b2fff;}
.add-btn{width:100%;background:rgba(123,47,255,.08);border:1px dashed rgba(123,47,255,.28);border-radius:10px;padding:13px;color:rgba(201,77,255,.55);font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;margin-top:8px;}
.stbar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(8,4,18,.95);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:10px 24px;font-size:11px;color:rgba(240,234,248,.6);z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.stbar.show{opacity:1;}
.stbar.ok{color:#1ed760;border-color:rgba(30,215,96,.3);}
.stbar.er{color:#ff4d6d;border-color:rgba(255,77,100,.3);}
</style>
</head>

</div>

function b64DecodeUtf8(b64){
  var bin=atob(b64);
  var pct='';
  for(var i=0;i<bin.length;i++){
    pct+='%'+('00'+bin.charCodeAt(i).toString(16)).slice(-2);
  }
  return decodeURIComponent(pct);
}
function b64EncodeUtf8(str){
  var pct=encodeURIComponent(str);
  var bin=pct.replace(/%([0-9A-F]{2})/gi,function(m,p){return String.fromCharCode(parseInt(p,16));});
  return btoa(bin);
}

function checkPw(){
  if(document.getElementById('pwIn').value===PW){
    document.getElementById('sPw').classList.add('hidden');
    var t=localStorage.getItem(TK);
    if(t){
      document.getElementById('tokDisp').value=t;
      document.getElementById('adminPage').style.display='block';
      loadCurrent(t);
    } else {
      document.getElementById('sTok').classList.remove('hidden');
    }
  } else {
    document.getElementById('pwErr').style.display='block';
  }
}
document.getElementById('pwIn').addEventListener('keydown',function(e){if(e.key==='Enter')checkPw();});

function saveTok(){
  var t=document.getElementById('tokIn').value.trim();
  if(t.indexOf('ghp_')!==0&&t.indexOf('github_pat_')!==0){
    document.getElementById('tokErr').style.display='block';return;
  }
  localStorage.setItem(TK,t);
  document.getElementById('sTok').classList.add('hidden');
  document.getElementById('tokDisp').value=t;
  document.getElementById('adminPage').style.display='block';
  loadCurrent(t);
}
document.getElementById('tokIn').addEventListener('keydown',function(e){if(e.key==='Enter')saveTok();});

function loadCurrent(token){

    headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json'}
  }).then(function(r){return r.json();}).then(function(data){
    var html=b64DecodeUtf8(data.content.replace(/\n/g,''));
    var m1=html.match(/<span class="line1">([^<]*)<\/span>/);
    var m2=html.match(/<span class="line2">([^<]*)<\/span>/);
    if(m1)document.getElementById('line1').value=m1[1];
    if(m2)document.getElementById('line2').value=m2[1];
    var found=[];
    var re=/<a href="([^"]*)"[^>]*class="link-card[^"]*"[\s\S]*?<div class="link-platform">([^<]*)<\/div><div class="link-label">([^<]*)<\/div>/g;
    var m;
    while((m=re.exec(html))!==null){
      found.push({url:m[1],platform:m[2],label:m[3]});
    }
    if(found.length>0)links=found;
    renderLinks();
  }).catch(function(){
    renderLinks();
  });
}

function renderLinks(){
  var list=document.getElementById('llist');
  list.innerHTML='';
  links.forEach(function(lk,i){
    var div=document.createElement('div');
    div.className='litem';div.draggable=true;div.dataset.i=i;
    div.innerHTML='<div class="lhdr"><span class="dh">≡</span><span class="lnum">Lien '+(i+1)+'</span><button class="delbtn" data-del="'+i+'">✕</button></div>'+
    '<div class="lflds">'+
    '<input type="text" placeholder="Nom" value="'+esc(lk.label)+'" data-f="label" data-i="'+i+'">'+
    '<input type="text" placeholder="Catégorie" value="'+esc(lk.platform)+'" data-f="platform" data-i="'+i+'">'+
    '<input type="url" placeholder="https://..." value="'+esc(lk.url)+'" data-f="url" data-i="'+i+'">'+
    '</div>';
    div.addEventListener('dragstart',function(){dragSrc=i;});
    div.addEventListener('dragover',function(e){e.preventDefault();div.classList.add('drag-over');});
    div.addEventListener('dragleave',function(){div.classList.remove('drag-over');});
    div.addEventListener('drop',function(e){
      e.preventDefault();div.classList.remove('drag-over');
      if(dragSrc!==null&&dragSrc!==i){
        var moved=links.splice(dragSrc,1)[0];
        links.splice(i,0,moved);
        renderLinks();
      }
    });
    var lt,isd=false;
    div.addEventListener('touchstart',function(e){
      lt=setTimeout(function(){isd=true;dragSrc=i;div.style.opacity='.5';},500);
    },{passive:true});
    div.addEventListener('touchend',function(){clearTimeout(lt);div.style.opacity='';isd=false;});
    div.addEventListener('touchmove',function(e){
      if(!isd){clearTimeout(lt);return;}
      var tc=e.touches[0];
      var els=document.elementsFromPoint(tc.clientX,tc.clientY);
      var tgt=null;
      for(var k=0;k<els.length;k++){
        if(els[k].classList&&els[k].classList.contains('litem')&&els[k]!==div){tgt=els[k];break;}
      }
      if(tgt){
        var ti=parseInt(tgt.dataset.i);
        if(ti!==dragSrc){
          var moved=links.splice(dragSrc,1)[0];
          links.splice(ti,0,moved);
          dragSrc=ti;
          renderLinks();
        }
      }
    },{passive:true});
    list.appendChild(div);
  });
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

// Délégation d'événements pour inputs et delete
document.addEventListener('input',function(e){
  var f=e.target.getAttribute('data-f');
  var i=e.target.getAttribute('data-i');
  if(f!==null&&i!==null){links[parseInt(i)][f]=e.target.value;}
});
document.addEventListener('click',function(e){
  var d=e.target.getAttribute('data-del');
  if(d!==null){links.splice(parseInt(d),1);renderLinks();}
});

function addLk(){
  links.push({label:'Nouveau',platform:'Catégorie',url:'https://'});
  renderLinks();
}

function showSt(msg,type){

  b.className='stbar show '+(type||'');
  setTimeout(function(){b.className='stbar';},4000);
}

  if(s.indexOf('discord')!==-1)return 'card-discord';
  return 'card-x';
}

function buildIndex(line1,line2,lks){
  var template=b64DecodeUtf8(TEMPLATE_B64);
  var linksHtml=lks.map(function(lk){
    return '<a href="'+lk.url+'" target="_blank" class="link-card '+getCls(lk.label,lk.url)+'">'+
    '<div class="link-icon">'+getIcon(lk.label,lk.url)+'</div>'+
    '<div class="link-info"><div class="link-platform">'+lk.platform+'</div><div class="link-label">'+lk.label+'</div></div>'+
    '<span class="link-arrow">→</span></a>';
  }).join('\n');
  template=template.replace('__LINE1__',line1);
  template=template.replace('__LINE2__',line2);
  template=template.replace('__LINKS__',linksHtml);
  return template;
}

function saveAll(){
  var token=localStorage.getItem(TK);
  if(!token){showSt('Token manquant','er');return;}
  var btn=document.getElementById('saveBtn');
  btn.classList.add('saving');btn.textContent='...';
  showSt('Envoi...');

  var line1=document.getElementById('line1').value;
  var line2=document.getElementById('line2').value;
  var newIndex=buildIndex(line1,line2,links);

  fetch('https://api.github.com/repos/'+REPO+'/contents/index.html',{
    headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json'}
  }).then(function(r){
    if(!r.ok)throw new Error('auth');
    return r.json();
  }).then(function(fd){
    var encoded=b64EncodeUtf8(newIndex);
    return fetch('https://api.github.com/repos/'+REPO+'/contents/index.html',{
      method:'PUT',
      headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'Admin update',content:encoded,sha:fd.sha})
    });
  }).then(function(res){
    if(res.ok){showSt('✓ Sauvegardé — live dans ~30s','ok');}
    else{return res.json().then(function(e){showSt('Erreur: '+(e.message||'?'),'er');});}
  }).catch(function(e){
    showSt(e.message==='auth'?'Erreur token':'Erreur réseau','er');
  }).finally(function(){
    btn.classList.remove('saving');btn.textContent='Sauvegarder';
  });
}

</script>
