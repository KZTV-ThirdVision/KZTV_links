<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KZTV Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#080412;font-family:'Space Mono',monospace;color:#f0eaf8;min-height:100vh;}
.screen{position:fixed;inset:0;background:#080412;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:1000;padding:20px;}
.screen.hidden{display:none;}
.screen img{width:130px;margin-bottom:8px;}
.stitle{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(240,234,248,.35);}
.inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:14px 18px;color:#f0eaf8;font-family:'Space Mono',monospace;font-size:13px;width:min(300px,85vw);text-align:center;outline:none;}
.inp:focus{border-color:#7b2fff;}
.hint{font-size:10px;color:rgba(240,234,248,.3);text-align:center;max-width:280px;line-height:1.6;}
.btn{background:linear-gradient(135deg,#7b2fff,#c94dff);border:none;border-radius:10px;padding:14px;color:white;font-family:'Space Mono',monospace;font-weight:700;font-size:13px;cursor:pointer;width:min(300px,85vw);}
.btn:active{opacity:.75;}
.errm{color:#ff4d6d;font-size:11px;display:none;}
.admin-page{display:none;min-height:100vh;padding-bottom:80px;background:#080412;}
.wrap{max-width:500px;margin:0 auto;padding:28px 20px;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.hdr h1{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:rgba(240,234,248,.35);}
.save-btn{background:linear-gradient(135deg,#7b2fff,#c94dff);border:none;border-radius:8px;padding:11px 22px;color:white;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;}
.save-btn.saving{opacity:.4;pointer-events:none;}
.sec{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px;margin-bottom:14px;}
.sec-t{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(240,234,248,.3);margin-bottom:14px;}
.fld{margin-bottom:10px;}
.fld label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(240,234,248,.28);display:block;margin-bottom:5px;}
.fld input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:11px 14px;color:#f0eaf8;font-family:'Space Mono',monospace;font-size:13px;outline:none;}
.fld input:focus{border-color:#7b2fff;}
.llist{display:flex;flex-direction:column;gap:8px;}
.litem{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 14px;touch-action:none;user-select:none;}
.litem.drag-over{border-color:#c94dff;}
.lhdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.dh{font-size:18px;color:rgba(240,234,248,.18);cursor:grab;flex-shrink:0;}
.lnum{font-size:9px;color:rgba(240,234,248,.3);flex:1;text-transform:uppercase;letter-spacing:.1em;}
.delbtn{background:none;border:none;color:rgba(255,77,100,.35);font-size:18px;cursor:pointer;}
.lflds{display:flex;flex-direction:column;gap:7px;}
.lflds input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:9px 12px;color:#f0eaf8;font-family:'Space Mono',monospace;font-size:12px;outline:none;}
.add-btn{width:100%;background:rgba(123,47,255,.08);border:1px dashed rgba(123,47,255,.28);border-radius:10px;padding:13px;color:rgba(201,77,255,.55);font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;margin-top:8px;}
.stbar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(8,4,18,.95);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:10px 24px;font-size:11px;color:rgba(240,234,248,.6);z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.stbar.show{opacity:1;}
.stbar.ok{color:#1ed760;border-color:rgba(30,215,96,.3);}
.stbar.er{color:#ff4d6d;border-color:rgba(255,77,100,.3);}
</style>
</head>
<body>

<div class="screen" id="sPw">
  <img src="https://raw.githubusercontent.com/KZTV-ThirdVision/KZTV_links/main/logo.png" alt="KZTV">
  <div class="stitle">Accès admin</div>
  <input class="inp" type="password" id="pwIn" placeholder="Mot de passe" autocomplete="off">
  <div class="errm" id="pwErr">Mot de passe incorrect</div>
  <button class="btn" onclick="checkPw()">Continuer</button>
</div>

<div class="screen hidden" id="sTok">
  <img src="https://raw.githubusercontent.com/KZTV-ThirdVision/KZTV_links/main/logo.png" alt="KZTV">
  <div class="stitle">Token GitHub</div>
  <input class="inp" type="password" id="tokIn" placeholder="ghp_..." autocomplete="off">
  <p class="hint">Token GitHub avec accès repo. Mémorisé sur cet appareil.</p>
  <div class="errm" id="tokErr">Token invalide</div>
  <button class="btn" onclick="saveTok()">Mémoriser et accéder</button>
</div>

<div class="admin-page" id="adminPage">
  <div class="wrap">
    <div class="hdr">
      <h1>KZTV · Admin</h1>
      <button class="save-btn" id="saveBtn" onclick="saveAll()">Sauvegarder</button>
    </div>
    <div class="sec">
      <div class="sec-t">Description</div>
      <div class="fld"><label>Ligne 1</label><input type="text" id="line1" value="L'ep s'appelle Dha ✦ ✦ ✦"></div>
      <div class="fld"><label>Ligne 2</label><input type="text" id="line2" value="Bienvenue de l'autre côté."></div>
    </div>
    <div class="sec">
      <div class="sec-t">Liens — glisser pour réordonner</div>
      <div class="llist" id="llist"></div>
      <button class="add-btn" onclick="addLk()">+ Ajouter un lien</button>
    </div>
    <div class="sec">
      <div class="sec-t">Token GitHub</div>
      <div class="fld"><input type="password" id="tokDisp" placeholder="ghp_..." oninput="localStorage.setItem('kztv_tok',this.value)"></div>
    </div>
  </div>
</div>
<div class="stbar" id="stbar"></div>

<script>
const PW="Linktreekztvavionarbre5!",REPO="KZTV-ThirdVision/KZTV_links",TK="kztv_tok";
const BG="https://raw.githubusercontent.com/KZTV-ThirdVision/KZTV_links/main/bg.webp",LOGO="https://raw.githubusercontent.com/KZTV-ThirdVision/KZTV_links/main/logo.png";
let links=[
  {label:"Spotify",platform:"Musique",url:"https://open.spotify.com/artist/2v6RwbFyutxTZbHPJX3eVH?si=1w1uRq-WRGe4utRNpJdWiw"},
  {label:"Instagram",platform:"Réseaux",url:"https://www.instagram.com/kztv__"},
  {label:"YouTube",platform:"Vidéos",url:"https://www.youtube.com/@kztv_v2"},
  {label:"TikTok",platform:"Contenu court",url:"https://www.tiktok.com/@kztv__"},
  {label:"X (Twitter)",platform:"Actu",url:"https://x.com/KZTV__"}
];
let dragSrc=null;

function checkPw(){
  if(document.getElementById('pwIn').value===PW){
    document.getElementById('sPw').classList.add('hidden');
    const t=localStorage.getItem(TK);
    if(t){document.getElementById('tokDisp').value=t;document.getElementById('adminPage').style.display='block';renderLinks();}
    else document.getElementById('sTok').classList.remove('hidden');
  }else document.getElementById('pwErr').style.display='block';
}
document.getElementById('pwIn').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});

function saveTok(){
  const t=document.getElementById('tokIn').value.trim();
  if(!t.startsWith('ghp_')&&!t.startsWith('github_pat_')){document.getElementById('tokErr').style.display='block';return;}
  localStorage.setItem(TK,t);
  document.getElementById('sTok').classList.add('hidden');
  document.getElementById('tokDisp').value=t;
  document.getElementById('adminPage').style.display='block';
  renderLinks();
}
document.getElementById('tokIn').addEventListener('keydown',e=>{if(e.key==='Enter')saveTok();});

function renderLinks(){
  const list=document.getElementById('llist');list.innerHTML='';
  links.forEach((lk,i)=>{
    const div=document.createElement('div');
    div.className='litem';div.draggable=true;div.dataset.i=i;
    div.innerHTML=`<div class="lhdr"><span class="dh">⠿</span><span class="lnum">Lien ${i+1}</span><button class="delbtn" onclick="delLk(${i})">✕</button></div><div class="lflds"><input type="text" placeholder="Nom" value="${lk.label}" oninput="links[${i}].label=this.value"><input type="text" placeholder="Catégorie" value="${lk.platform}" oninput="links[${i}].platform=this.value"><input type="url" placeholder="https://..." value="${lk.url}" oninput="links[${i}].url=this.value"></div>`;
    div.addEventListener('dragstart',()=>dragSrc=i);
    div.addEventListener('dragover',e=>{e.preventDefault();div.classList.add('drag-over');});
    div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
    div.addEventListener('drop',e=>{e.preventDefault();div.classList.remove('drag-over');if(dragSrc!==null&&dragSrc!==i){const[m]=links.splice(dragSrc,1);links.splice(i,0,m);renderLinks();}});
    let lt,isd=false;
    div.addEventListener('touchstart',e=>{lt=setTimeout(()=>{isd=true;dragSrc=i;div.style.opacity='.5';},500);},{passive:true});
    div.addEventListener('touchend',()=>{clearTimeout(lt);div.style.opacity='';isd=false;});
    div.addEventListener('touchmove',e=>{if(!isd){clearTimeout(lt);return;}const tc=e.touches[0],els=document.elementsFromPoint(tc.clientX,tc.clientY);const tgt=els.find(el=>el.classList.contains('litem')&&el!==div);if(tgt){const ti=parseInt(tgt.dataset.i);if(ti!==dragSrc){const[m]=links.splice(dragSrc,1);links.splice(ti,0,m);dragSrc=ti;renderLinks();}}},{passive:true});
    list.appendChild(div);
  });
}
function addLk(){links.push({label:'Nouveau',platform:'Catégorie',url:'https://'});renderLinks();}
function delLk(i){links.splice(i,1);renderLinks();}
function showSt(msg,type=''){const b=document.getElementById('stbar');b.textContent=msg;b.className='stbar show '+type;setTimeout(()=>b.className='stbar',3500);}

const ICONS={
  spotify:'<svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z" fill="#1ED760"/></svg>',
  instagram:'<svg viewBox="0 0 24 24"><defs><linearGradient id="ig" x1="0" y1="24" x2="24" y2="0"><stop offset="0%" stop-color="#f09433"/><stop offset="50%" stop-color="#dc2743"/><stop offset="100%" stop-color="#bc1888"/></linearGradient></defs><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" fill="url(#ig)"/></svg>',
  youtube:'<svg viewBox="0 0 24 24"><path d="M23.495 6.205a3.007 3.007 0 00-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 00.527 6.205a31.247 31.247 0 00-.522 5.805 31.247 31.247 0 00.522 5.783 3.007 3.007 0 002.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 002.088-2.088 31.247 31.247 0 00.5-5.783 31.247 31.247 0 00-.5-5.805zM9.609 15.601V8.408l6.264 3.602z" fill="#FF0000"/></svg>',
  tiktok:'<svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z" fill="#00f2ea"/></svg>',
  x:'<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="white"/></svg>'
};
function getIcon(l,u){const s=(l+u).toLowerCase();if(s.includes('spotify'))return ICONS.spotify;if(s.includes('instagram'))return ICONS.instagram;if(s.includes('youtube'))return ICONS.youtube;if(s.includes('tiktok'))return ICONS.tiktok;return ICONS.x;}
function getCls(l,u){const s=(l+u).toLowerCase();if(s.includes('spotify'))return'card-spotify';if(s.includes('instagram'))return'card-instagram';if(s.includes('youtube'))return'card-youtube';if(s.includes('tiktok'))return'card-tiktok';return'card-x';}

function buildIndex(line1,line2,lks){
  const lh=lks.map(lk=>`<a href="${lk.url}" target="_blank" class="link-card ${getCls(lk.label,lk.url)}"><div class="link-icon">${getIcon(lk.label,lk.url)}</div><div class="link-info"><div class="link-platform">${lk.platform}</div><div class="link-label">${lk.label}</div></div><span class="link-arrow">→</span></a>`).join('\n');
  return `<!DOCTYPE html>\n<html lang="fr">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>KZTV</title>\n<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">\n<style>\n*{margin:0;padding:0;box-sizing:border-box;}\nhtml,body{background:#080412;font-family:'Space Mono',monospace;overflow-x:hidden;}\n.bg{position:fixed;inset:0;background-image:url("${BG}");background-repeat:no-repeat;background-position:center top;background-size:cover;will-change:transform,filter;z-index:0;}\n@media(min-width:600px){.bg{background-size:contain;background-color:#080412;}}\n.page{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;}\n.hero{height:75svh;min-height:440px;width:100%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:24px;}\n.hero-bottom{display:flex;flex-direction:column;align-items:center;gap:10px;}\n.hero-logo{width:min(68vw,270px);animation:pulse 6s ease-in-out infinite;}\n@media(min-width:600px){.hero-logo{width:200px;}}\n@keyframes pulse{0%,100%{filter:drop-shadow(0 0 6px rgba(123,47,255,.45));}50%{filter:drop-shadow(0 0 14px rgba(123,47,255,.7)) drop-shadow(0 0 25px rgba(201,77,255,.25));}}\n.tagline{text-align:center;}\n.line1{font-family:'IM Fell English',serif;font-size:15px;color:rgba(240,234,248,.75);letter-spacing:.04em;display:block;margin-bottom:3px;}\n.line2{font-family:'IM Fell English',serif;font-size:13px;color:rgba(240,234,248,.45);letter-spacing:.08em;display:block;}\n.scroll-hint{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0;animation:fadeIn 1s 2s both;}\n.scroll-hint span{font-size:8px;letter-spacing:.3em;color:rgba(240,234,248,.25);text-transform:uppercase;}\n.scroll-line{width:1px;height:16px;background:linear-gradient(180deg,rgba(201,77,255,.4),transparent);animation:lp 1.8s ease-in-out infinite;}\n@keyframes lp{0%,100%{opacity:.3;}50%{opacity:1;}}\n@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}\n.links-section{width:100%;max-width:460px;padding:20px 20px 60px;display:flex;flex-direction:column;gap:10px;background:linear-gradient(180deg,rgba(8,4,18,.6) 0%,rgba(8,4,18,.85) 40px);}\n.link-card{display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(8,4,18,.58);border:1px solid rgba(255,255,255,.1);border-radius:12px;text-decoration:none;color:#f0eaf8;transition:all .25s ease;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}\n.link-card:hover,.link-card:active{background:rgba(123,47,255,.2);border-color:rgba(123,47,255,.4);transform:translateX(4px);}\n.link-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.link-icon svg{width:20px;height:20px;}\n.link-info{flex:1;}\n.link-platform{font-size:9px;color:rgba(240,234,248,.3);margin-bottom:2px;}\n.link-label{font-size:14px;font-weight:700;color:#f0eaf8;}\n.link-arrow{color:rgba(240,234,248,.2);font-size:16px;flex-shrink:0;}\n.card-spotify .link-icon{background:rgba(30,215,96,.12);}\n.card-instagram .link-icon{background:rgba(228,64,95,.12);}\n.card-youtube .link-icon{background:rgba(255,0,0,.1);}\n.card-tiktok .link-icon{background:rgba(0,242,234,.08);}\n.card-x .link-icon{background:rgba(255,255,255,.06);}\nfooter{text-align:center;padding:16px 0 30px;width:100%;}\nfooter p{font-size:9px;letter-spacing:.3em;color:rgba(255,255,255,.12);text-transform:uppercase;}\n</style>\n</head>\n<body>\n<div class="bg" id="bg"></div>\n<div class="page">\n<div class="hero"><div class="hero-bottom"><img class="hero-logo" src="${LOGO}" alt="KZTV"><div class="tagline"><span class="line1">${line1}</span><span class="line2">${line2}</span></div></div><div class="scroll-hint"><span>découvrir</span><div class="scroll-line"></div></div></div>\n<div class="links-section">\n${lh}\n</div>\n<footer><p>KZTV — third vision — 2026</p></footer>\n</div>\n<script>\nconst bg=document.getElementById('bg');let ticking=false;window.addEventListener('scroll',()=>{if(!ticking){requestAnimationFrame(()=>{const s=window.scrollY,vh=window.innerHeight,p=Math.min(s/vh,1);bg.style.transform=\'scale(\'+( 1+p*0.08)+'\')';bg.style.filter=\'blur(\'+( p*12)+'px)\';ticking=false;});ticking=true;}},{passive:true});\n<\/script>\n</body>\n</html>`;
}

async function saveAll(){
  const token=localStorage.getItem(TK);
  if(!token){showSt('Token manquant','er');return;}
  const btn=document.getElementById('saveBtn');
  btn.classList.add('saving');btn.textContent='...';
  showSt('Envoi...');
  const line1=document.getElementById('line1').value;
  const line2=document.getElementById('line2').value;
  const newIndex=buildIndex(line1,line2,links);
  try{
    const r=await fetch('https://api.github.com/repos/'+REPO+'/contents/index.html',{headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json'}});
    if(!r.ok){showSt('Erreur auth','er');btn.classList.remove('saving');btn.textContent='Sauvegarder';return;}
    const fd=await r.json();
    const enc=btoa(unescape(encodeURIComponent(newIndex)));
    const res=await fetch('https://api.github.com/repos/'+REPO+'/contents/index.html',{
      method:'PUT',
      headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'Admin update',content:enc,sha:fd.sha})
    });
    if(res.ok)showSt('✓ Live dans ~30s','ok');
    else{const e=await res.json();showSt('Erreur: '+(e.message||'?'),'er');}
  }catch(e){showSt('Erreur réseau','er');}
  btn.classList.remove('saving');btn.textContent='Sauvegarder';
}
