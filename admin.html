<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KZTV Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#080412;font-family:'Inter',sans-serif;color:#f0eaf8;min-height:100vh;font-size:15px;}
.screen{position:fixed;inset:0;background:#080412;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:1000;padding:20px;}
.screen.hidden{display:none;}.screen img{width:130px;margin-bottom:8px;}
.stitle{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,234,248,.35);}
.inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:14px 18px;color:#f0eaf8;font-family:'Inter',sans-serif;font-size:15px;width:min(300px,85vw);text-align:center;outline:none;}
.inp:focus{border-color:#7b2fff;}
.hint{font-size:12px;color:rgba(240,234,248,.3);text-align:center;max-width:280px;line-height:1.6;}
.btn{background:linear-gradient(135deg,#7b2fff,#c94dff);border:none;border-radius:10px;padding:14px;color:white;font-family:'Inter',sans-serif;font-weight:700;font-size:15px;cursor:pointer;width:min(300px,85vw);}.btn:active{opacity:.75;}
.errm{color:#ff4d6d;font-size:13px;display:none;}
.admin-page{display:none;min-height:100vh;padding-bottom:80px;background:#080412;}
.wrap{max-width:500px;margin:0 auto;padding:28px 20px;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.hdr h1{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,234,248,.35);font-weight:600;}
.save-btn{background:linear-gradient(135deg,#7b2fff,#c94dff);border:none;border-radius:8px;padding:11px 22px;color:white;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.save-btn.saving{opacity:.4;pointer-events:none;}
.tabs{display:flex;gap:0;margin-bottom:18px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.1);}
.tab{flex:1;padding:12px;text-align:center;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,234,248,.35);cursor:pointer;background:rgba(255,255,255,.02);transition:all .2s;font-weight:600;}
.tab.active{color:#f0eaf8;background:rgba(123,47,255,.2);}
.tab:hover{color:rgba(240,234,248,.6);}
.sec{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px;margin-bottom:14px;}
.sec-t{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,234,248,.3);margin-bottom:14px;font-weight:600;}
.fld{margin-bottom:10px;}.fld label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,234,248,.28);display:block;margin-bottom:5px;font-weight:600;}
.fld input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:11px 14px;color:#f0eaf8;font-family:'Inter',sans-serif;font-size:15px;outline:none;}
.fld input:focus{border-color:#7b2fff;}
.llist,.rlist{display:flex;flex-direction:column;gap:10px;}
.litem{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px;user-select:none;}
.litem.drag-over{border-color:#c94dff;}
.lhdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.dh{font-size:18px;color:rgba(240,234,248,.18);cursor:grab;flex-shrink:0;touch-action:none;}
.lnum{font-size:11px;color:rgba(240,234,248,.35);flex:1;font-weight:600;}
.delbtn{background:none;border:none;color:rgba(255,77,100,.4);font-size:20px;cursor:pointer;}
.lflds{display:flex;flex-direction:column;gap:8px;}
.lflds input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:10px 12px;color:#f0eaf8;font-family:'Inter',sans-serif;font-size:14px;outline:none;}
.lflds input:focus{border-color:#7b2fff;}
.file-label{display:block;background:rgba(123,47,255,.08);border:1px dashed rgba(123,47,255,.25);border-radius:8px;padding:11px 12px;color:rgba(201,77,255,.55);font-size:13px;cursor:pointer;text-align:center;font-weight:600;}
.file-label:hover{background:rgba(123,47,255,.15);}
.add-btn{width:100%;background:rgba(123,47,255,.08);border:1px dashed rgba(123,47,255,.28);border-radius:10px;padding:14px;color:rgba(201,77,255,.55);font-family:'Inter',sans-serif;font-size:14px;cursor:pointer;margin-top:10px;font-weight:600;}
.stbar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(8,4,18,.95);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:10px 24px;font-size:13px;color:rgba(240,234,248,.6);z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.stbar.show{opacity:1;}.stbar.ok{color:#1ed760;border-color:rgba(30,215,96,.3);}.stbar.er{color:#ff4d6d;border-color:rgba(255,77,100,.3);}
</style>
</head>
<body>
<div class="screen" id="sPw"><img src="https://raw.githubusercontent.com/KZTV-ThirdVision/KZTV_links/main/logo.png" alt="KZTV"><div class="stitle">Accès admin</div><input class="inp" type="password" id="pwIn" placeholder="Mot de passe" autocomplete="off"><div class="errm" id="pwErr">Mot de passe incorrect</div><button class="btn" onclick="checkPw()">Continuer</button></div>
<div class="screen hidden" id="sTok"><img src="https://raw.githubusercontent.com/KZTV-ThirdVision/KZTV_links/main/logo.png" alt="KZTV"><div class="stitle">Token GitHub</div><input class="inp" type="password" id="tokIn" placeholder="ghp_..." autocomplete="off"><p class="hint">Token GitHub avec accès repo. Mémorisé sur cet appareil.</p><div class="errm" id="tokErr">Token invalide</div><button class="btn" onclick="saveTok()">Mémoriser et accéder</button></div>
<div class="admin-page" id="adminPage">
<div class="wrap">
<div class="hdr"><h1>KZTV · Admin</h1><button class="save-btn" id="saveBtn" onclick="saveAll()">Sauvegarder</button></div>
<div class="tabs"><div class="tab active" id="tabLinks" onclick="switchTab('links')">Liens</div><div class="tab" id="tabReleases" onclick="switchTab('releases')">Sorties</div></div>
<div id="panelLinks">
<div class="sec"><div class="sec-t">Description</div><div class="fld"><label>Ligne 1</label><input type="text" id="line1" value=""></div><div class="fld"><label>Ligne 2</label><input type="text" id="line2" value=""></div></div>
<div class="sec"><div class="sec-t">Liens</div><div class="llist" id="llist"></div><button class="add-btn" onclick="addLk()">+ Ajouter un lien</button></div>
</div>
<div id="panelReleases" style="display:none;">
<div class="sec"><div class="sec-t">Tes sorties</div><div class="rlist" id="rlist"></div><button class="add-btn" onclick="addRelease()">+ Nouvelle sortie</button></div>
</div>
<div class="sec" style="margin-top:14px;"><div class="sec-t">Token</div><div class="fld"><input type="password" id="tokDisp" placeholder="ghp_..." oninput="localStorage.setItem('kztv_tok',this.value)"></div></div>
</div></div>
<div class="stbar" id="stbar"></div>

function b64DecodeUtf8(b64){var bin=atob(b64);var pct='';for(var i=0;i<bin.length;i++){pct+='%'+('00'+bin.charCodeAt(i).toString(16)).slice(-2);}return decodeURIComponent(pct);}
function b64EncodeUtf8(str){var pct=encodeURIComponent(str);var bin=pct.replace(/%([0-9A-F]{2})/gi,function(m,p){return String.fromCharCode(parseInt(p,16));});return btoa(bin);}

function checkPw(){
  if(document.getElementById('pwIn').value===PW){
    document.getElementById('sPw').classList.add('hidden');
    var t=localStorage.getItem(TK);
    if(t){document.getElementById('tokDisp').value=t;document.getElementById('adminPage').style.display='block';loadCurrent(t);}
    else document.getElementById('sTok').classList.remove('hidden');
  }else document.getElementById('pwErr').style.display='block';
}
document.getElementById('pwIn').addEventListener('keydown',function(e){if(e.key==='Enter')checkPw();});
function saveTok(){
  var t=document.getElementById('tokIn').value.trim();
  if(t.indexOf('ghp_')!==0&&t.indexOf('github_pat_')!==0){document.getElementById('tokErr').style.display='block';return;}
  localStorage.setItem(TK,t);document.getElementById('sTok').classList.add('hidden');
  document.getElementById('tokDisp').value=t;document.getElementById('adminPage').style.display='block';loadCurrent(t);
}
document.getElementById('tokIn').addEventListener('keydown',function(e){if(e.key==='Enter')saveTok();});

function loadCurrent(token){
  fetch('https://api.github.com/repos/'+REPO+'/contents/index.html',{headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json'}})
  .then(function(r){return r.json();}).then(function(data){
    var html=b64DecodeUtf8(data.content.replace(/\n/g,''));
    var m1=html.match(/<span class="line1">([^<]*)<\/span>/);
    var m2=html.match(/<span class="line2">([^<]*)<\/span>/);
    if(m1)document.getElementById('line1').value=m1[1];
    if(m2)document.getElementById('line2').value=m2[1];
    var found=[];
    var re=/<a href="([^"]*)"[^>]*class="link-card[^"]*"[\s\S]*?<div class="link-platform">([^<]*)<\/div><div class="link-label">([^<]*)<\/div>/g;
    var m;while((m=re.exec(html))!==null){found.push({url:m[1],platform:m[2],label:m[3]});}
    if(found.length>0)links=found;
    renderLinks();
  }).catch(function(){renderLinks();});
  fetch('https://api.github.com/repos/'+REPO+'/contents/releases.json',{headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json'}})
  .then(function(r){if(!r.ok)throw new Error('x');return r.json();}).then(function(data){
    releases=JSON.parse(b64DecodeUtf8(data.content.replace(/\n/g,'')));renderReleases();
  }).catch(function(){releases=[];renderReleases();});
}

function switchTab(tab){
  activeTab=tab;
  document.getElementById('tabLinks').className=tab==='links'?'tab active':'tab';
  document.getElementById('tabReleases').className=tab==='releases'?'tab active':'tab';
  document.getElementById('panelLinks').style.display=tab==='links'?'block':'none';
  document.getElementById('panelReleases').style.display=tab==='releases'?'block':'none';
}

function renderLinks(){
  var list=document.getElementById('llist');list.innerHTML='';
  links.forEach(function(lk,i){
    var div=document.createElement('div');div.className='litem';div.draggable=true;div.dataset.i=i;
    div.innerHTML='<div class="lhdr"><span class="dh">\u2261</span><span class="lnum">Lien '+(i+1)+'</span><button class="delbtn" data-del="'+i+'">\u2715</button></div><div class="lflds"><input type="text" placeholder="Nom" value="'+esc(lk.label)+'" data-f="label" data-i="'+i+'"><input type="text" placeholder="Cat\u00e9gorie" value="'+esc(lk.platform)+'" data-f="platform" data-i="'+i+'"><input type="url" placeholder="https://..." value="'+esc(lk.url)+'" data-f="url" data-i="'+i+'"></div>';
    div.addEventListener('dragstart',function(){dragSrc=i;});
    div.addEventListener('dragover',function(e){e.preventDefault();div.classList.add('drag-over');});
    div.addEventListener('dragleave',function(){div.classList.remove('drag-over');});
    div.addEventListener('drop',function(e){e.preventDefault();div.classList.remove('drag-over');if(dragSrc!==null&&dragSrc!==i){var moved=links.splice(dragSrc,1)[0];links.splice(i,0,moved);renderLinks();}});
    list.appendChild(div);
  });
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
document.addEventListener('input',function(e){

  if(f!==null&&i!==null)links[parseInt(i)][f]=e.target.value;
  var rf=e.target.getAttribute('data-rf'),ri=e.target.getAttribute('data-ri');
  if(rf!==null&&ri!==null)releases[parseInt(ri)][rf]=e.target.value;
});
document.addEventListener('click',function(e){
  var d=e.target.getAttribute('data-del');if(d!==null){links.splice(parseInt(d),1);renderLinks();}

});

function renderReleases(){
  var list=document.getElementById('rlist');list.innerHTML='';
  releases.forEach(function(rel,i){
    var slug=slugify(rel.title||'');
    var coverPrev=pendingImages[i]&&pendingImages[i].coverDataUrl?pendingImages[i].coverDataUrl:(rel.coverUrl||'');
    var bgPrev=pendingImages[i]&&pendingImages[i].bgDataUrl?pendingImages[i].bgDataUrl:(rel.bgUrl||'');
    var prevHtml='<div style="display:flex;gap:8px;margin-bottom:8px;">';

document.addEventListener('change',function(e){
  var coverIdx=e.target.getAttribute('data-cover');
  var bgIdx=e.target.getAttribute('data-bg');
  if(coverIdx!==null)compressAndStore(e.target.files[0],parseInt(coverIdx),'cover',600);
  if(bgIdx!==null)compressAndStore(e.target.files[0],parseInt(bgIdx),'bg',1200);
});

function compressAndStore(file,idx,type,maxSize){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var w=img.width,h=img.height;
      if(type==='cover'){var s=Math.min(w,h);var sx=(w-s)/2,sy=(h-s)/2;canvas.width=maxSize;canvas.height=maxSize;canvas.getContext('2d').drawImage(img,sx,sy,s,s,0,0,maxSize,maxSize);}
      else{if(w>maxSize){var ratio=maxSize/w;canvas.width=maxSize;canvas.height=Math.round(h*ratio);}else{canvas.width=w;canvas.height=h;}canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);}
      var dataUrl=canvas.toDataURL('image/jpeg',0.82);
      var raw=dataUrl.split(',')[1];
      if(!pendingImages[idx])pendingImages[idx]={};
      pendingImages[idx][type]=raw;
      pendingImages[idx][type+'DataUrl']=dataUrl;
      showSt((type==='cover'?'Cover':'Fond')+' compress\u00e9 \u2714','ok');
      renderReleases();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function getCls(l,u){var s=(l+u).toLowerCase();if(s.indexOf('spotify')!==-1)return'card-spotify';if(s.indexOf('instagram')!==-1)return'card-instagram';if(s.indexOf('youtube')!==-1)return'card-youtube';if(s.indexOf('tiktok')!==-1)return'card-tiktok';if(s.indexOf('deezer')!==-1)return'card-deezer';if(s.indexOf('apple')!==-1)return'card-apple';return'card-x';}

function buildIndex(line1,line2,lks){
  var template=b64DecodeUtf8(TEMPLATE_B64);
  var lh=lks.map(function(lk){return '<a href="'+lk.url+'" target="_blank" class="link-card '+getCls(lk.label,lk.url)+'"><div class="link-icon">'+getIconForLink(lk.label,lk.url)+'</div><div class="link-info"><div class="link-platform">'+lk.platform+'</div><div class="link-label">'+lk.label+'</div></div><span class="link-arrow">\u2192</span></a>';}).join('\n');
  return template.replace('__LINE1__',line1).replace('__LINE2__',line2).replace('__LINKS__',lh);
}
function buildReleasePage(rel){
  var tpl=b64DecodeUtf8(RELEASE_TPL_B64);
  var coverImg=rel.coverUrl||'https://raw.githubusercontent.com/'+REPO+'/main/logo.png';
  var bgImg=rel.bgUrl||coverImg;
  var platforms=[{key:'youtube',name:'YouTube',action:'Clip',cls:'i-youtube'},{key:'spotify',name:'Spotify',action:'\u00c9couter',cls:'i-spotify'},{key:'apple',name:'Apple Music',action:'\u00c9couter',cls:'i-apple'},{key:'deezer',name:'Deezer',action:'\u00c9couter',cls:'i-deezer'},{key:'amazon',name:'Amazon Music',action:'\u00c9couter',cls:'i-amazon'}];
  var lh=platforms.filter(function(p){return rel[p.key]&&rel[p.key].trim()!=='';}).map(function(p){return '<a href="'+rel[p.key]+'" target="_blank" class="link-btn"><div class="icon '+p.cls+'">'+getIcon(p.key)+'</div><span class="action">'+p.action+'</span><div class="spacer"></div><span class="name">'+p.name+'</span><span class="arrow">\u2192</span></a>';}).join('\n');
  return tpl.replace(/__TITLE__/g,rel.title||'Nouveau son').replace('__COVER_IMG__',coverImg).replace('__BG_IMG__',bgImg).replace('__LINKS__',lh);
}

function pushFile(token,filename,content){
  return fetch('https://api.github.com/repos/'+REPO+'/contents/'+filename,{headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json'}})
  .then(function(r){if(r.ok)return r.json();return{sha:null};})
  .then(function(fd){var body={message:'Update '+filename,content:b64EncodeUtf8(content)};if(fd.sha)body.sha=fd.sha;return fetch('https://api.github.com/repos/'+REPO+'/contents/'+filename,{method:'PUT',headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});});
}
function pushBinaryFile(token,filename,base64content){
  return fetch('https://api.github.com/repos/'+REPO+'/contents/'+filename,{headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json'}})
  .then(function(r){if(r.ok)return r.json();return{sha:null};})
  .then(function(fd){var body={message:'Upload '+filename,content:base64content};if(fd.sha)body.sha=fd.sha;return fetch('https://api.github.com/repos/'+REPO+'/contents/'+filename,{method:'PUT',headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});});
}

function saveAll(){
  var token=localStorage.getItem(TK);if(!token){showSt('Token manquant','er');return;}
  var btn=document.getElementById('saveBtn');btn.classList.add('saving');btn.textContent='...';showSt('Envoi...');
  var line1=document.getElementById('line1').value,line2=document.getElementById('line2').value;
  var newIndex=buildIndex(line1,line2,links);
  var chain=Promise.resolve();
  releases.forEach(function(rel,i){
    var slug=rel.slug||slugify(rel.title||'nouveau-son');
    if(pendingImages[i]){
      if(pendingImages[i].cover){chain=chain.then(function(){showSt('Upload cover...');return pushBinaryFile(token,'releases/'+slug+'-cover.jpg',pendingImages[i].cover);}).then(function(){rel.coverUrl='https://raw.githubusercontent.com/'+REPO+'/main/releases/'+slug+'-cover.jpg?v='+Date.now();});}
      if(pendingImages[i].bg){chain=chain.then(function(){showSt('Upload fond...');return pushBinaryFile(token,'releases/'+slug+'-bg.jpg',pendingImages[i].bg);}).then(function(){rel.bgUrl='https://raw.githubusercontent.com/'+REPO+'/main/releases/'+slug+'-bg.jpg?v='+Date.now();});}
    }
  });
  chain=chain.then(function(){showSt('Index...');return fetch('https://api.github.com/repos/'+REPO+'/contents/index.html',{headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json'}}).then(function(r){return r.json();}).then(function(fd){return fetch('https://api.github.com/repos/'+REPO+'/contents/index.html',{method:'PUT',headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({message:'Admin update',content:b64EncodeUtf8(newIndex),sha:fd.sha})});});});
  chain=chain.then(function(){var clean=releases.map(function(r){return{title:r.title,slug:r.slug||slugify(r.title||''),youtube:r.youtube,spotify:r.spotify,apple:r.apple,deezer:r.deezer,amazon:r.amazon,coverUrl:r.coverUrl||'',bgUrl:r.bgUrl||''};});return pushFile(token,'releases.json',JSON.stringify(clean,null,2));});
  releases.forEach(function(rel){chain=chain.then(function(){var slug=rel.slug||slugify(rel.title||'nouveau-son');showSt('Page '+slug+'...');return pushFile(token,slug+'.html',buildReleasePage(rel));});});
  chain.then(function(){pendingImages={};showSt('\u2713 Tout sauvegard\u00e9','ok');}).catch(function(e){showSt('Erreur: '+e.message,'er');}).finally(function(){btn.classList.remove('saving');btn.textContent='Sauvegarder';});
}
