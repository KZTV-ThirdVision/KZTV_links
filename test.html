*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#080412;font-family:'Space Mono',monospace;overflow-x:hidden;min-height:100vh;}
.bg{position:fixed;inset:0;background-image:url("https://raw.githubusercontent.com/KZTV-ThirdVision/KZTV_links/main/bg.webp");background-repeat:no-repeat;background-position:center top;background-size:cover;filter:blur(12px) brightness(0.3);z-index:0;}
.page{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;min-height:100vh;justify-content:center;padding:40px 20px;}
.card{max-width:420px;width:100%;display:flex;flex-direction:column;align-items:center;gap:20px;}
.logo{width:120px;margin-bottom:4px;}
.title{font-family:'IM Fell English',serif;font-size:clamp(22px,5vw,30px);color:#f0eaf8;letter-spacing:.04em;text-align:center;}
.subtitle{font-family:'IM Fell English',serif;font-size:13px;color:rgba(240,234,248,.4);letter-spacing:.1em;text-align:center;margin-top:-8px;}
.links{width:100%;display:flex;flex-direction:column;gap:10px;margin-top:10px;}
.link-btn{display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(8,4,18,.6);border:1px solid rgba(255,255,255,.1);border-radius:12px;text-decoration:none;color:#f0eaf8;transition:all .25s ease;backdrop-filter:blur(10px);}
.link-btn:hover,.link-btn:active{background:rgba(123,47,255,.2);border-color:rgba(123,47,255,.4);transform:translateX(4px);}
.link-btn .icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.link-btn .icon svg{width:20px;height:20px;}
.link-btn .action{font-size:13px;color:rgba(240,234,248,.5);}
.link-btn .name{font-size:14px;font-weight:700;}
.link-btn .right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.link-btn .arrow{color:rgba(240,234,248,.2);font-size:16px;}
.back{margin-top:20px;font-size:10px;letter-spacing:.2em;color:rgba(240,234,248,.25);text-decoration:none;text-transform:uppercase;}
.back:hover{color:rgba(240,234,248,.5);}
.i-spotify{background:rgba(30,215,96,.12);}
.i-youtube{background:rgba(255,0,0,.1);}
.i-apple{background:rgba(250,36,60,.1);}
.i-deezer{background:rgba(162,56,255,.12);}
.i-amazon{background:rgba(255,153,0,.1);}
</style>
